// ============================================================
// Edge Function: submit-event
// Accepts one event OR a batch of events from authenticated
// external sources (e.g. skalswiss.org) and inserts them as
// DRAFT for review before publishing.
// Deploy via Supabase Dashboard > Edge Functions > Deploy a new
// function > Via Editor
// ============================================================

import { createClient } from 'https://esm.sh/@supabase/supabase-js@2'

const supabaseAdmin = createClient(
  Deno.env.get('SUPABASE_URL')!,
  Deno.env.get('SUPABASE_SERVICE_ROLE_KEY')!
)

const CORS_HEADERS = {
  'Access-Control-Allow-Origin': '*',
  'Access-Control-Allow-Headers': 'authorization, x-client-info, apikey, content-type, x-api-key',
  'Access-Control-Allow-Methods': 'POST, OPTIONS'
}

function json(body: unknown, status = 200) {
  return new Response(JSON.stringify(body), {
    status,
    headers: { 'Content-Type': 'application/json', ...CORS_HEADERS }
  })
}

const VALID_TYPES = ['academy', 'club_event', 'fair', 'congress', 'delegates_assembly']
const VALID_MODES = ['online', 'in_person', 'hybrid']
const MAX_BATCH_SIZE = 500

type EventInput = Record<string, unknown>
type EventResult =
  | { success: true; event_id: string; status: string; skipped?: boolean; error?: string }
  | { success: false; error: string }

Deno.serve(async (req) => {
  if (req.method === 'OPTIONS') {
    return new Response('ok', { headers: CORS_HEADERS })
  }
  if (req.method !== 'POST') {
    return json({ error: 'Method not allowed. Use POST.' }, 405)
  }

  // ---------- 1. Authenticate the source via API key ----------
  const apiKey = req.headers.get('x-api-key')
  if (!apiKey) {
    return json({ error: 'Missing X-API-Key header.' }, 401)
  }

  const { data: source, error: sourceErr } = await supabaseAdmin
    .from('import_sources')
    .select('id, name, active')
    .eq('api_key', apiKey)
    .maybeSingle()

  if (sourceErr) {
    return json({ error: 'Internal error validating API key.' }, 500)
  }
  if (!source || !source.active) {
    return json({ error: 'Invalid or inactive API key.' }, 401)
  }

  // ---------- 2. Parse the body: single event OR batch ----------
  let body: unknown
  try {
    body = await req.json()
  } catch {
    return json({ error: 'Invalid JSON body.' }, 400)
  }

  let events: EventInput[]
  if (Array.isArray(body)) {
    events = body as EventInput[]
  } else if (body && Array.isArray((body as Record<string, unknown>).events)) {
    events = (body as Record<string, unknown>).events as EventInput[]
  } else {
    events = [body as EventInput] // single event submitted directly
  }

  if (events.length === 0) {
    return json({ error: 'No events provided.' }, 422)
  }
  if (events.length > MAX_BATCH_SIZE) {
    return json({ error: `Too many events in one request. Maximum is ${MAX_BATCH_SIZE} per batch — split into multiple requests.` }, 422)
  }

  // ---------- 3. Prefetch countries & clubs once for the whole batch ----------
  const [{ data: countries }, { data: clubs }] = await Promise.all([
    supabaseAdmin.from('countries').select('id, iso_code'),
    supabaseAdmin.from('clubs').select('id, name')
  ])
  const countryByCode = new Map((countries ?? []).map(c => [c.iso_code.toUpperCase(), c.id]))
  const clubByName = new Map((clubs ?? []).map(c => [c.name.toLowerCase(), c.id]))

  // ---------- 4. Validate + insert each event ----------
  const results: EventResult[] = []
  for (const ev of events) {
    results.push(await processEvent(ev, source.id, countryByCode, clubByName))
  }

  const inserted = results.filter(r => r.success).length
  const failed = results.length - inserted

  return json({
    success: failed === 0,
    received: results.length,
    inserted,
    failed,
    results: results.map((r, i) => ({ index: i, ...r }))
  }, 200)
})

async function processEvent(
  body: EventInput,
  importSourceId: number,
  countryByCode: Map<string, number>,
  clubByName: Map<string, number>
): Promise<EventResult> {
  if (typeof body !== 'object' || body === null) {
    return { success: false, error: 'Event must be a JSON object.' }
  }

  const required = ['type', 'title', 'start_date']
  for (const field of required) {
    if (!body[field]) {
      return { success: false, error: `Missing required field: ${field}` }
    }
  }

  if (!VALID_TYPES.includes(body.type as string)) {
    return { success: false, error: `Invalid "type". Must be one of: ${VALID_TYPES.join(', ')}` }
  }
  if (body.mode && !VALID_MODES.includes(body.mode as string)) {
    return { success: false, error: `Invalid "mode". Must be one of: ${VALID_MODES.join(', ')}` }
  }
  if (isNaN(Date.parse(body.start_date as string))) {
    return { success: false, error: '"start_date" must be a valid ISO 8601 date/time.' }
  }
  if (body.end_date && isNaN(Date.parse(body.end_date as string))) {
    return { success: false, error: '"end_date" must be a valid ISO 8601 date/time.' }
  }

  let country_id: number | null = null
  if (body.country_code) {
    const code = (body.country_code as string).toUpperCase()
    if (!countryByCode.has(code)) {
      return { success: false, error: `Unknown country_code: ${body.country_code}. Use ISO 3166-1 alpha-2 (e.g. "IT", "CH").` }
    }
    country_id = countryByCode.get(code)!
  }

  let club_id: number | null = null
  const requiresClub = body.type === 'academy' || body.type === 'club_event'

  if (requiresClub) {
    if (!body.club_name) {
      return { success: false, error: `Missing required field: club_name (required for type "${body.type}")` }
    }
    const match = clubByName.get((body.club_name as string).toLowerCase())
    if (!match) {
      return { success: false, error: `Unknown club_name: "${body.club_name}". It must exactly match one of the registered Skål club names — check the club list in the API documentation, or contact the Skål Europe team if this is a new club.` }
    }
    club_id = match
  } else if (body.club_name) {
    // Optional for "fair" events: link if it matches, otherwise ignore silently.
    club_id = clubByName.get((body.club_name as string).toLowerCase()) ?? null
  }

  if (body.venue_lat != null && (typeof body.venue_lat !== 'number' || body.venue_lat < -90 || body.venue_lat > 90)) {
    return { success: false, error: '"venue_lat" must be a number between -90 and 90.' }
  }
  if (body.venue_lng != null && (typeof body.venue_lng !== 'number' || body.venue_lng < -180 || body.venue_lng > 180)) {
    return { success: false, error: '"venue_lng" must be a number between -180 and 180.' }
  }

  const fields = {
    type: body.type,
    title: body.title,
    description: body.description ?? null,
    start_date: body.start_date,
    end_date: body.end_date ?? null,
    timezone: body.timezone ?? 'Europe/Rome',
    mode: body.mode ?? 'in_person',
    language: body.language ?? 'en',
    club_id,
    country_id,
    official_url: body.official_url ?? null,
    registration_url: body.registration_url ?? null,
    image_url: body.image_url ?? null,
    venue_name: body.venue_name ?? null,
    venue_address: body.venue_address ?? null,
    venue_lat: body.venue_lat ?? null,
    venue_lng: body.venue_lng ?? null,
    has_skal_booth: body.has_skal_booth ?? false,
    booth_details: body.booth_details ?? null,
    tags: Array.isArray(body.tags) ? body.tags : []
  }

  // ---------- Deduplication ----------
  // Preferred path: the source provides a stable external_ref (e.g. its own
  // event ID). We upsert on (import_source_id, external_ref) — re-sending the
  // same event updates its content but never creates a second row, and never
  // touches "status", so a human's review decision (published/cancelled) is
  // never silently overwritten by a re-sync.
  if (body.external_ref) {
    const external_ref = String(body.external_ref)

    const { data: existing } = await supabaseAdmin
      .from('events')
      .select('id, status')
      .eq('import_source_id', importSourceId)
      .eq('external_ref', external_ref)
      .maybeSingle()

    if (existing) {
      const { error: updateErr } = await supabaseAdmin
        .from('events')
        .update(fields)
        .eq('id', existing.id)

      if (updateErr) return { success: false, error: updateErr.message }
      return { success: true, event_id: existing.id, status: existing.status }
    }

    const { data: inserted, error: insertErr } = await supabaseAdmin
      .from('events')
      .insert({ ...fields, status: 'draft', source: 'import', import_source_id: importSourceId, external_ref })
      .select('id, status')
      .single()

    if (insertErr) return { success: false, error: insertErr.message }
    return { success: true, event_id: inserted.id, status: inserted.status }
  }

  // ---------- Fallback: no external_ref provided ----------
  // Best-effort duplicate check on (source, title, start_date). This is a
  // safety net, not a substitute for external_ref — near-duplicate titles or
  // slightly different timestamps will not be caught. Strongly recommend
  // sending external_ref instead wherever the source system has a stable ID.
  const { data: possibleDuplicate } = await supabaseAdmin
    .from('events')
    .select('id, status')
    .eq('import_source_id', importSourceId)
    .eq('start_date', fields.start_date)
    .ilike('title', (fields.title as string).trim())
    .maybeSingle()

  if (possibleDuplicate) {
    return {
      success: true,
      event_id: possibleDuplicate.id,
      status: possibleDuplicate.status,
      skipped: true,
      error: 'Skipped: an event with the same title and start_date from this source already exists. Send "external_ref" to update it instead of relying on this heuristic.'
    }
  }

  const { data: inserted, error: insertErr } = await supabaseAdmin
    .from('events')
    .insert({ ...fields, status: 'draft', source: 'import', import_source_id: importSourceId })
    .select('id, status')
    .single()

  if (insertErr) {
    return { success: false, error: insertErr.message }
  }

  return { success: true, event_id: inserted.id, status: inserted.status }
}
