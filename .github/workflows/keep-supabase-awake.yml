name: Keep Supabase awake

on:
  schedule:
    - cron: '0 4 */3 * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Query the countries table (real database activity)
        run: |
          curl -s -o /dev/null -w "%{http_code}\n" \
            "https://fbtxpgxblbfjkezbsdqv.supabase.co/rest/v1/countries?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
