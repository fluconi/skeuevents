<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skål Europe — Events Admin</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#314691; --light-blue:#65a8de; --grey:#59595b;
    --yellow:#edd945; --ink:#2b2b2d; --muted:#6b6f76;
    --line:#e4e6ea; --bg:#f7f8fa; --white:#ffffff;
    --danger:#a5394a; --success:#3f8f5f;
    --font:"Montserrat",sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font);}
  a{color:inherit;}

  header{
    background:var(--white); border-bottom:1px solid var(--line);
    padding:16px 24px; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px;
  }
  header .title{font-weight:700; font-size:17px; color:var(--navy);}
  header .title span{color:var(--muted); font-weight:500; font-size:13px; display:block;}
  .user-box{display:flex; align-items:center; gap:12px; font-size:13px;}
  .role-badge{
    background:var(--navy); color:var(--white); font-size:11px; font-weight:600;
    padding:3px 9px; border-radius:20px; text-transform:uppercase; letter-spacing:.04em;
  }
  .btn{
    border:1px solid var(--line); background:var(--white); color:var(--navy);
    padding:8px 14px; border-radius:6px; font-family:var(--font); font-size:13px;
    font-weight:600; cursor:pointer;
  }
  .btn:hover{border-color:var(--light-blue);}
  .btn.primary{background:var(--navy); color:var(--white); border-color:var(--navy);}
  .btn.danger{color:var(--danger); border-color:var(--danger);}
  .btn:disabled{opacity:.4; cursor:not-allowed;}

  main{max-width:1000px; margin:0 auto; padding:28px 24px 60px;}

  #loginGate{max-width:380px; margin:80px auto; text-align:center;}
  #loginGate h2{font-size:19px; color:var(--navy); margin-bottom:6px;}
  #loginGate p{color:var(--muted); font-size:13.5px; margin-bottom:24px;}
  #loginGate .btn{width:100%; margin-bottom:10px; padding:11px;}

  #accessDenied{max-width:420px; margin:80px auto; text-align:center; color:var(--muted); font-size:14px;}

  .tabs{display:flex; gap:4px; margin-bottom:20px; border-bottom:1px solid var(--line);}
  .tabs button{
    background:none; border:none; padding:10px 16px; font-family:var(--font);
    font-size:14px; font-weight:600; color:var(--muted); cursor:pointer;
    border-bottom:2px solid transparent; margin-bottom:-1px;
  }
  .tabs button.active{color:var(--navy); border-color:var(--navy);}

  .panel{display:none;}
  .panel.active{display:block;}

  .scope-notice{
    background:#eaf3fb; border:1px solid var(--light-blue); color:var(--navy);
    font-size:12.5px; padding:10px 14px; border-radius:6px; margin-bottom:18px;
  }
  .scope-warning{
    background:#fdf3e0; border:1px solid var(--yellow); color:#5a4d00;
    font-size:12.5px; padding:10px 14px; border-radius:6px; margin-bottom:18px;
  }

  form.event-form{
    background:var(--white); border:1px solid var(--line); border-radius:10px; padding:24px;
    display:grid; grid-template-columns:1fr 1fr; gap:14px;
  }
  form.event-form .full{grid-column:1/-1;}
  form.event-form label{display:block; font-size:11.5px; font-weight:600; color:var(--muted); text-transform:uppercase; letter-spacing:.03em; margin-bottom:5px;}
  form.event-form input, form.event-form select, form.event-form textarea{
    width:100%; padding:9px 11px; border:1px solid var(--line); border-radius:6px;
    font-family:var(--font); font-size:13.5px; color:var(--ink); background:var(--white);
  }
  form.event-form textarea{min-height:70px; resize:vertical;}
  form.event-form input:disabled, form.event-form select:disabled{background:var(--bg); color:var(--muted);}
  .checkbox-row{display:flex; align-items:center; gap:8px;}
  .checkbox-row input{width:auto;}
  #boothFields{display:none;}
  #boothFields.show{display:contents;}
  #formMsg{grid-column:1/-1; font-size:13px; padding:8px 0;}
  #formMsg.error{color:var(--danger);}
  #formMsg.success{color:var(--success);}

  .filter-row{display:flex; gap:10px; margin-bottom:14px; align-items:center; flex-wrap:wrap;}
  .filter-row select{padding:7px 10px; border:1px solid var(--line); border-radius:6px; font-family:var(--font); font-size:13px;}

  table{width:100%; border-collapse:collapse; background:var(--white); border:1px solid var(--line); border-radius:10px; overflow:hidden;}
  th, td{padding:10px 12px; text-align:left; font-size:13px; border-bottom:1px solid var(--line);}
  th{background:var(--bg); font-size:11px; text-transform:uppercase; letter-spacing:.03em; color:var(--muted);}
  tr:last-child td{border-bottom:none;}
  .status-select{padding:5px 8px; border-radius:6px; border:1px solid var(--line); font-family:var(--font); font-size:12.5px;}
  .type-tag{font-size:10.5px; text-transform:uppercase; font-weight:700; padding:2px 8px; border-radius:20px;}
  .type-tag.academy{background:#e7edf7; color:var(--navy);}
  .type-tag.club_event{background:#eef3ee; color:#3f6b4a;}
  .type-tag.fair{background:#eaf3fb; color:var(--light-blue);}
  .row-actions{display:flex; gap:6px;}
</style>
</head>
<body>

<div id="loginGate">
  <h2>Skål Europe — Events Admin</h2>
  <p>Sign in to manage events.</p>
  <button class="btn primary" id="btnGoogle">Sign in with Google</button>
  <button class="btn" id="btnApple">Sign in with Apple</button>
</div>

<div id="accessDenied" style="display:none;">
  You're signed in, but your account doesn't have any event-management role yet. Contact the Skål Europe admin to request access.
</div>

<div id="app" style="display:none;">
  <header>
    <div class="title">Skål Europe — Events Admin<span id="userLine"></span></div>
    <div class="user-box">
      <span class="role-badge" id="roleBadge"></span>
      <button class="btn" id="btnLogout">Sign out</button>
    </div>
  </header>
  <main>
    <div class="tabs">
      <button data-tab="new" class="active">New event</button>
      <button data-tab="manage">Manage events</button>
    </div>

    <div class="panel active" id="panel-new">
      <div id="scopeNotice"></div>
      <form class="event-form" id="eventForm">
        <div>
          <label>Type</label>
          <select id="f_type" required>
            <option value="fair">Trade fair</option>
            <option value="academy">Academy</option>
            <option value="club_event">Club event</option>
          </select>
        </div>
        <div>
          <label>Status</label>
          <select id="f_status">
            <option value="draft">Draft</option>
            <option value="published">Published</option>
          </select>
        </div>
        <div class="full">
          <label>Title</label>
          <input id="f_title" required>
        </div>
        <div class="full">
          <label>Description</label>
          <textarea id="f_description"></textarea>
        </div>
        <div>
          <label>Start date/time</label>
          <input type="datetime-local" id="f_start" required>
        </div>
        <div>
          <label>End date/time</label>
          <input type="datetime-local" id="f_end">
        </div>
        <div>
          <label>Mode</label>
          <select id="f_mode">
            <option value="in_person">In person</option>
            <option value="online">Online</option>
            <option value="hybrid">Hybrid</option>
          </select>
        </div>
        <div>
          <label>Language</label>
          <select id="f_language">
            <option value="en">English</option>
            <option value="fr">French</option>
            <option value="it">Italian</option>
            <option value="de">German</option>
            <option value="es">Spanish</option>
          </select>
        </div>
        <div>
          <label>Country</label>
          <select id="f_country"><option value="">—</option></select>
        </div>
        <div id="clubField">
          <label>Club</label>
          <select id="f_club"><option value="">—</option></select>
        </div>
        <div class="full" id="boothFields">
          <div class="checkbox-row">
            <input type="checkbox" id="f_has_booth">
            <label style="margin:0;">Skål booth present at this fair</label>
          </div>
        </div>
        <div class="full" id="boothDetailsWrap" style="display:none;">
          <label>Booth details</label>
          <input id="f_booth_details" placeholder="e.g. Hall 5.1, Stand 101">
        </div>
        <div>
          <label>Official site URL</label>
          <input id="f_official_url" type="url">
        </div>
        <div>
          <label>Registration URL</label>
          <input id="f_registration_url" type="url">
        </div>
        <div class="full">
          <label>Event image (PNG, JPG/JPEG or SVG)</label>
          <input type="file" id="f_image_file" accept=".png,.jpg,.jpeg,.svg,image/png,image/jpeg,image/svg+xml">
          <div id="imageUploadStatus" style="font-size:12px; color:var(--muted); margin-top:5px;"></div>
          <input id="f_image_url" type="url" placeholder="…or paste an image URL directly" style="margin-top:8px;">
        </div>
        <div class="full">
          <label>Tags (comma-separated)</label>
          <input id="f_tags" placeholder="leadership, sustainability">
        </div>
        <div class="full" id="formMsg"></div>
        <div class="full" style="display:flex; gap:10px;">
          <button type="submit" class="btn primary" id="btnSubmit">Create event</button>
          <button type="button" class="btn" id="btnCancelEdit" style="display:none;">Cancel edit</button>
        </div>
      </form>
    </div>

    <div class="panel" id="panel-manage">
      <div class="filter-row">
        <select id="filterStatus">
          <option value="">All statuses</option>
          <option value="draft">Draft</option>
          <option value="published">Published</option>
          <option value="cancelled">Cancelled</option>
        </select>
        <select id="filterType">
          <option value="">All types</option>
          <option value="academy">Academy</option>
          <option value="club_event">Club event</option>
          <option value="fair">Trade fair</option>
        </select>
        <select id="filterCountry"><option value="">All countries</option></select>
        <select id="filterClub"><option value="">All clubs</option></select>
        <button class="btn" id="btnRefresh">Refresh</button>
      </div>
      <table>
        <thead>
          <tr><th>Title</th><th>Type</th><th>Club / Country</th><th>Start</th><th>Status</th><th>Actions</th></tr>
        </thead>
        <tbody id="eventsTableBody"></tbody>
      </table>
    </div>
  </main>
</div>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  let profile = null; // { role, club_id, country_id, full_name }
  let countries = [];
  let clubs = [];
  let editingEventId = null;

  const el = id => document.getElementById(id);

  // ---------- Auth ----------
  el('btnGoogle').addEventListener('click', () => supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.href } }));
  el('btnApple').addEventListener('click', () => supabase.auth.signInWithOAuth({ provider: 'apple', options: { redirectTo: window.location.href } }));
  el('btnLogout').addEventListener('click', () => supabase.auth.signOut());

  supabase.auth.onAuthStateChange((_event, session) => {
    if (session) init(session); else showLoginGate();
  });
  supabase.auth.getSession().then(({ data: { session } }) => {
    if (session) init(session); else showLoginGate();
  });

  function showLoginGate(){
    el('loginGate').style.display = 'block';
    el('accessDenied').style.display = 'none';
    el('app').style.display = 'none';
  }

  async function init(session){
    el('loginGate').style.display = 'none';

    const { data: p } = await supabase
      .from('profiles')
      .select('role, club_id, country_id, full_name, email')
      .eq('id', session.user.id)
      .maybeSingle();

    if (!p || !['admin','event_manager','local_event_manager'].includes(p.role)) {
      el('accessDenied').style.display = 'block';
      el('app').style.display = 'none';
      return;
    }

    profile = p;
    el('accessDenied').style.display = 'none';
    el('app').style.display = 'block';
    el('userLine').textContent = p.full_name || p.email || '';
    el('roleBadge').textContent = p.role.replace(/_/g,' ');

    await loadReferenceData();
    applyScopeToForm();
    await loadEvents();
  }

  // ---------- Tabs ----------
  document.querySelectorAll('.tabs button').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      el('panel-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'manage') loadEvents();
    });
  });

  // ---------- Reference data ----------
  async function loadReferenceData(){
    const [{ data: c }, { data: cl }] = await Promise.all([
      supabase.from('countries').select('id,name').order('name'),
      supabase.from('clubs').select('id,name,country_id').order('name')
    ]);
    countries = c || [];
    clubs = cl || [];

    el('f_country').innerHTML = '<option value="">—</option>' +
      countries.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
    el('f_club').innerHTML = '<option value="">—</option>' +
      clubs.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');

    el('filterCountry').innerHTML = '<option value="">All countries</option>' +
      countries.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
    el('filterClub').innerHTML = '<option value="">All clubs</option>' +
      clubs.map(c => `<option value="${c.id}">${esc(c.name)}</option>`).join('');
  }

  // ---------- Scope handling for local_event_manager ----------
  function applyScopeToForm(){
    const notice = el('scopeNotice');
    if (profile.role === 'local_event_manager') {
      if (profile.club_id) {
        el('f_club').value = String(profile.club_id);
        el('f_club').disabled = true;
        const club = clubs.find(c => c.id === profile.club_id);
        if (club && club.country_id) el('f_country').value = String(club.country_id);
        notice.innerHTML = `<div class="scope-notice">Your account is scoped to a single club — new events will be created for that club.</div>`;
      } else if (profile.country_id) {
        el('f_country').value = String(profile.country_id);
        el('f_country').disabled = true;
        notice.innerHTML = `<div class="scope-notice">Your account is scoped to a country — you can create events for any club within it.</div>`;
      } else {
        notice.innerHTML = `<div class="scope-warning">Your account has no club or country scope assigned yet. Event creation will be rejected until an admin assigns one.</div>`;
      }
    }
  }

  // ---------- Image upload ----------
  const ALLOWED_IMAGE_TYPES = ['image/png', 'image/jpeg', 'image/svg+xml'];
  el('f_image_file').addEventListener('change', async () => {
    const file = el('f_image_file').files[0];
    const status = el('imageUploadStatus');
    if (!file) return;

    if (!ALLOWED_IMAGE_TYPES.includes(file.type)) {
      status.textContent = 'Unsupported file type. Please use PNG, JPG/JPEG or SVG.';
      status.style.color = 'var(--danger)';
      el('f_image_file').value = '';
      return;
    }

    status.textContent = 'Uploading…';
    status.style.color = 'var(--muted)';

    const ext = file.name.split('.').pop();
    const path = `${Date.now()}-${Math.random().toString(36).slice(2,8)}.${ext}`;

    const { error: uploadErr } = await supabase.storage.from('event-images').upload(path, file, { upsert: true });
    if (uploadErr) {
      status.textContent = 'Upload failed: ' + uploadErr.message;
      status.style.color = 'var(--danger)';
      return;
    }

    const { data: pub } = supabase.storage.from('event-images').getPublicUrl(path);
    el('f_image_url').value = pub.publicUrl;
    status.textContent = 'Image uploaded ✓';
    status.style.color = 'var(--success)';
  });

  // ---------- Type-dependent field visibility ----------
  function updateTypeFields(){
    const type = el('f_type').value;
    const isFair = type === 'fair';
    el('boothFields').classList.toggle('show', isFair);
    el('boothDetailsWrap').style.display = (isFair && el('f_has_booth').checked) ? 'block' : 'none';
    // Club is required for academy/club_event, optional for fair
    el('clubField').style.opacity = (type === 'fair' && !el('f_club').disabled) ? '0.6' : '1';
  }
  el('f_type').addEventListener('change', updateTypeFields);
  el('f_has_booth').addEventListener('change', updateTypeFields);
  updateTypeFields();

  // ---------- Edit mode helpers ----------
  function toDatetimeLocal(iso){
    if (!iso) return '';
    const d = new Date(iso);
    const pad = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function enterEditMode(ev){
    editingEventId = ev.id;
    el('f_type').value = ev.type;
    el('f_status').value = ev.status;
    el('f_title').value = ev.title || '';
    el('f_description').value = ev.description || '';
    el('f_start').value = toDatetimeLocal(ev.start_date);
    el('f_end').value = toDatetimeLocal(ev.end_date);
    el('f_mode').value = ev.mode || 'in_person';
    el('f_language').value = ev.language || 'en';
    el('f_country').value = ev.country_id ? String(ev.country_id) : '';
    el('f_club').value = ev.club_id ? String(ev.club_id) : '';
    el('f_official_url').value = ev.official_url || '';
    el('f_registration_url').value = ev.registration_url || '';
    el('f_image_url').value = ev.image_url || '';
    el('f_has_booth').checked = !!ev.has_skal_booth;
    el('f_booth_details').value = ev.booth_details || '';
    el('f_tags').value = (ev.tags || []).join(', ');

    applyScopeToForm(); // re-applies club/country lock for local_event_manager
    updateTypeFields();

    el('btnSubmit').textContent = 'Update event';
    el('btnCancelEdit').style.display = 'inline-block';
    el('formMsg').className = ''; el('formMsg').textContent = '';

    document.querySelectorAll('.tabs button').forEach(b => b.classList.toggle('active', b.dataset.tab === 'new'));
    document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel-new'));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function exitEditMode(){
    editingEventId = null;
    el('eventForm').reset();
    el('btnSubmit').textContent = 'Create event';
    el('btnCancelEdit').style.display = 'none';
    el('imageUploadStatus').textContent = '';
    applyScopeToForm();
    updateTypeFields();
  }
  el('btnCancelEdit').addEventListener('click', exitEditMode);

  // ---------- Create or update event ----------
  el('eventForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const msg = el('formMsg');
    msg.className = ''; msg.textContent = '';
    el('btnSubmit').disabled = true;

    const type = el('f_type').value;

    if (type !== 'fair' && !el('f_club').value) {
      msg.className = 'error'; msg.textContent = 'Club is required for academies and club events.';
      el('btnSubmit').disabled = false;
      return;
    }

    const tags = el('f_tags').value.split(',').map(t => t.trim()).filter(Boolean);

    const payload = {
      type,
      title: el('f_title').value,
      description: el('f_description').value || null,
      start_date: el('f_start').value ? new Date(el('f_start').value).toISOString() : null,
      end_date: el('f_end').value ? new Date(el('f_end').value).toISOString() : null,
      mode: el('f_mode').value,
      language: el('f_language').value,
      country_id: el('f_country').value ? Number(el('f_country').value) : null,
      club_id: el('f_club').value ? Number(el('f_club').value) : null,
      official_url: el('f_official_url').value || null,
      registration_url: el('f_registration_url').value || null,
      image_url: el('f_image_url').value || null,
      has_skal_booth: type === 'fair' ? el('f_has_booth').checked : false,
      booth_details: (type === 'fair' && el('f_has_booth').checked) ? (el('f_booth_details').value || null) : null,
      status: el('f_status').value,
      tags
    };

    let error;
    if (editingEventId) {
      ({ error } = await supabase.from('events').update(payload).eq('id', editingEventId));
    } else {
      payload.source = 'manual';
      ({ error } = await supabase.from('events').insert(payload));
    }

    if (error) {
      msg.className = 'error';
      msg.textContent = (editingEventId ? 'Could not update event: ' : 'Could not create event: ') + error.message;
    } else {
      msg.className = 'success';
      msg.textContent = editingEventId ? 'Event updated successfully.' : 'Event created successfully.';
      const wasEditing = !!editingEventId;
      exitEditMode();
      if (wasEditing) loadEvents();
    }
    el('btnSubmit').disabled = false;
  });

  // ---------- Manage events ----------
  el('btnRefresh').addEventListener('click', loadEvents);
  [el('filterStatus'), el('filterType'), el('filterCountry'), el('filterClub')].forEach(x => x.addEventListener('change', loadEvents));

  async function loadEvents(){
    const tbody = el('eventsTableBody');
    tbody.innerHTML = '<tr><td colspan="6">Loading…</td></tr>';

    let query = supabase
      .from('events')
      .select('*, clubs(name), countries(name)')
      .order('start_date', { ascending: false });

    if (el('filterStatus').value) query = query.eq('status', el('filterStatus').value);
    if (el('filterType').value) query = query.eq('type', el('filterType').value);
    if (el('filterCountry').value) query = query.eq('country_id', el('filterCountry').value);
    if (el('filterClub').value) query = query.eq('club_id', el('filterClub').value);

    const { data, error } = await query;
    if (error) {
      tbody.innerHTML = `<tr><td colspan="6">Error loading events: ${esc(error.message)}</td></tr>`;
      return;
    }
    if (!data.length) {
      tbody.innerHTML = '<tr><td colspan="6">No events found.</td></tr>';
      return;
    }

    window._eventsById = Object.fromEntries(data.map(ev => [ev.id, ev]));

    tbody.innerHTML = data.map(ev => `
      <tr data-id="${ev.id}">
        <td>${esc(ev.title)}</td>
        <td><span class="type-tag ${ev.type}">${ev.type.replace('_',' ')}</span></td>
        <td>${ev.clubs ? esc(ev.clubs.name) : (ev.countries ? esc(ev.countries.name) : '—')}</td>
        <td>${ev.start_date ? new Date(ev.start_date).toLocaleDateString() : '—'}</td>
        <td>
          <select class="status-select" data-id="${ev.id}">
            <option value="draft" ${ev.status==='draft'?'selected':''}>Draft</option>
            <option value="published" ${ev.status==='published'?'selected':''}>Published</option>
            <option value="cancelled" ${ev.status==='cancelled'?'selected':''}>Cancelled</option>
          </select>
        </td>
        <td class="row-actions">
          <button class="btn" data-edit="${ev.id}">Edit</button>
          ${canHardDelete() ? `<button class="btn danger" data-delete="${ev.id}">Delete</button>` : ''}
        </td>
      </tr>
    `).join('');

    tbody.querySelectorAll('.status-select').forEach(sel => {
      sel.addEventListener('change', async () => {
        const { error } = await supabase.from('events').update({ status: sel.value }).eq('id', sel.dataset.id);
        if (error) alert('Could not update status: ' + error.message);
      });
    });
    tbody.querySelectorAll('[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => enterEditMode(window._eventsById[btn.dataset.edit]));
    });
    tbody.querySelectorAll('[data-delete]').forEach(btn => {
      btn.addEventListener('click', async () => {
        if (!confirm('Delete this event permanently?')) return;
        const { error } = await supabase.from('events').delete().eq('id', btn.dataset.delete);
        if (error) alert('Could not delete: ' + error.message);
        else loadEvents();
      });
    });
  }

  function canHardDelete(){
    return profile.role === 'admin' || profile.role === 'event_manager';
  }

  function esc(s){
    return (s || '').toString().replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }
</script>
</body>
</html>
